# ============================================================
# 동천교회 홈페이지 - Docker Compose 배포
#
# 사용법:
#   cp .env.example .env    # 환경 변수 수정
#   docker compose up -d    # 실행
#   docker compose exec app npx prisma db push    # DB 테이블 생성
#   docker compose exec app npx prisma db seed    # 초기 데이터
# ============================================================

services:
  # ---- MySQL 8 ----
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-dongcheon2024!}
      MYSQL_DATABASE: ${DB_NAME:-dongcheon}
      MYSQL_USER: ${DB_USER:-dongcheon}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dongcheon1234!}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Next.js 앱 ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER:-dongcheon}:${DB_PASSWORD:-dongcheon1234!}@db:3306/${DB_NAME:-dongcheon}
      NEXTAUTH_URL: ${SITE_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-key-in-production}
      UPLOAD_DIR: /app/data
      SITE_NAME: 동천교회
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/data

  # ---- Nginx (선택 - SSL 적용 시 사용) ----
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    profiles:
      - with-nginx

volumes:
  mysql_data:
  uploads_data:
