<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>업데이트 중 — 동천교회</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    max-width: 480px;
    width: 100%;
    padding: 2.5rem 2rem;
    background: white;
    border-radius: 1rem;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
  }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.25rem;
    color: #2563eb;
    animation: spin 2.5s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  h1 {
    margin: 0 0 0.75rem;
    font-size: 1.4rem;
    font-weight: 700;
    color: #1e3a8a;
  }
  p {
    margin: 0.4rem 0;
    color: #4b5563;
    line-height: 1.6;
    font-size: 0.95rem;
  }
  .small {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #9ca3af;
  }
  .btn {
    margin-top: 1.5rem;
    padding: 0.6rem 1.6rem;
    background: #2563eb;
    color: white;
    border: 0;
    border-radius: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card" role="status" aria-live="polite">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
  </svg>
  <h1>홈페이지 업데이트 중입니다</h1>
  <p>잠시만 기다려 주세요.</p>
  <p>보통 <strong>30초 ~ 2분</strong> 안에 완료됩니다.</p>
  <button class="btn" type="button" onclick="location.reload()">새로 고침</button>
  <p class="small">점검이 끝나면 자동으로 다시 표시됩니다.</p>
</div>
<script>
  // 백그라운드에서 5초마다 silent 재시도 — 끝나면 자동 복귀, 사용자에게 카운트는 숨김
  setInterval(function() { location.reload(); }, 5000);
</script>
</body>
</html>
