# ============================================================
# 동천교회 홈페이지 - Nginx 리버스 프록시 설정
#
# SSL 인증서 설정:
#   1. certbot으로 발급: certbot certonly --standalone -d pkistdc.net
#   2. nginx/ssl/ 에 복사:
#      - ssl/fullchain.pem
#      - ssl/privkey.pem
#   3. docker compose --profile with-nginx up -d
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 포맷
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 업로드 크기 제한 (10MB)
    client_max_body_size 10M;

    # 업스트림 (Next.js 앱)
    upstream nextjs {
        server app:3000;
    }

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name pkistdc.net www.pkistdc.net;

        # Let's Encrypt 인증용
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 메인 서버
    server {
        listen 443 ssl http2;
        server_name pkistdc.net www.pkistdc.net;

        # SSL 인증서
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL 보안 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 보안 헤더
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ================================================================
        # 제로보드 레거시 URL 리다이렉트 (301 Permanent)
        # Nginx 레벨에서 처리하여 검색엔진 크롤링 즉시 대응
        # ================================================================

        # zboard.php → /board/[id]
        location = /bbs/zboard.php {
            if ($arg_id) {
                return 301 /board/$arg_id?$args;
            }
            return 301 /;
        }

        # view.php → /board/[id]/[no]
        location = /bbs/view.php {
            if ($arg_id) {
                return 301 /board/$arg_id/$arg_no;
            }
            return 301 /;
        }

        # write.php → /board/[id]/write
        location = /bbs/write.php {
            if ($arg_id) {
                return 301 /board/$arg_id/write?mode=$arg_mode&no=$arg_no;
            }
            return 301 /;
        }

        # login.php → /auth/login
        location = /bbs/login.php {
            return 301 /auth/login;
        }

        # admin.php → /admin
        location = /bbs/admin.php {
            return 301 /admin;
        }

        # 기존 제로보드 이미지/파일 경로 (data/ 디렉토리로 통합)
        location /bbs/data/ {
            alias /app/data/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ================================================================
        # 정적 파일 캐싱
        # ================================================================

        # Next.js 빌드 에셋 (장기 캐시)
        location /_next/static/ {
            proxy_pass http://nextjs;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # 업로드 파일
        location /uploads/ {
            alias /app/public/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # 스킨 프리뷰 이미지
        location /skins/ {
            alias /app/public/skins/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # favicon, robots
        location = /favicon.ico {
            proxy_pass http://nextjs;
            expires 30d;
        }
        location = /robots.txt {
            proxy_pass http://nextjs;
            expires 1d;
        }

        # ================================================================
        # 메인 프록시
        # ================================================================
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # 타임아웃
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
