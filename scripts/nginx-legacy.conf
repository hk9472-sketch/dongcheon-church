# =====================================================================
# 레거시 ZB 사이트 (pkistdc.net:8080) — 독립 운영 (단순 프록시)
# =====================================================================
# 신홈과 연계 없이 ZB 자체 로그인 / 쓰기 / 비밀글 등 모두 자체 처리.
# 외부 노출은 그대로 가져가되, ZB 의 자체 인증 시스템에 의존.
#
# 적용:
#   sudo cp scripts/nginx-legacy.conf /etc/nginx/sites-available/legacy-zb
#   sudo ln -sf /etc/nginx/sites-available/legacy-zb /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 나중에 신홈 SSO 게이트로 다시 보호하려면 nginx-legacy-sso.conf 로 교체.
# =====================================================================

server {
    listen 8080;
    server_name _;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:18080;

        # $http_host 는 포트 포함 — ZB 가 $_SERVER['HTTP_HOST'] 로 자체 URL
        # 생성 시 :8080 이 보존되어야 함. $host 쓰면 포트 떨어져서 신홈으로 빠짐.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ZB 가 보내는 큰 응답 헤더 (P3P 등) 처리용 버퍼.
        # 부족하면 nginx 가 응답을 조용히 깨뜨려 브라우저가 ERR_INVALID_RESPONSE.
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_read_timeout 60s;
    }
}
