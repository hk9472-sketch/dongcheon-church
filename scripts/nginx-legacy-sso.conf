# =====================================================================
# 레거시 ZB 사이트 (pkistdc.net:8080) SSO 게이트
# =====================================================================
# 동작:
#   1) 모든 요청에 대해 /__sso_check 서브요청
#   2) 서브요청은 신홈 (https://pkistdc.net/api/legacy-auth/verify) 으로 프록시
#   3) 신홈이 dc_legacy_token 쿠키 검증 → 200 또는 401
#   4) 401 이면 신홈 로그인 페이지로 302 (현재 URL 을 redirect 로 전달)
#   5) 200 이면 그대로 ZB (127.0.0.1:18080) 로 패스
#
# 필요 모듈: ngx_http_auth_request_module (대부분의 nginx 패키지에 포함)
#   $ nginx -V 2>&1 | grep -o auth_request
#
# 적용:
#   sudo cp scripts/nginx-legacy-sso.conf /etc/nginx/sites-available/pkistdc-legacy
#   sudo ln -sf /etc/nginx/sites-available/pkistdc-legacy /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================================

server {
    listen 8080;
    server_name pkistdc.net;

    # ZB 의 정적 자원/이미지/CSS 등은 인증 없이 통과 (공개해도 안전한 자원).
    # 인증 비용 절감 + 페이지 렌더 속도 유지.
    # 필요 시 더 엄격하게 잠그려면 이 location 블록 제거 (그러면 모든 요청이 인증 거침).
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        proxy_pass http://127.0.0.1:18080;
        # $http_host 는 포트 포함 (pkistdc.net:8080) — ZB 가 자체 URL 생성 시
        # $_SERVER['HTTP_HOST'] 로 포트 보존하도록.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 인증 서브요청 — 내부에서만 호출 가능.
    location = /__sso_check {
        internal;
        proxy_pass https://pkistdc.net/api/legacy-auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host pkistdc.net;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_ssl_server_name on;
        proxy_ssl_name pkistdc.net;
        # 신홈이 응답 못하면 인증 실패 처리 (서비스 보호).
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
    }

    # 401 → 로그인 페이지로 302.
    # $scheme 이 http 라 호스트가 :8080 임을 명시.
    location @sso_login {
        return 302 https://pkistdc.net/auth/login?redirect=$scheme://$host:$server_port$request_uri;
    }

    # 모든 요청 — 인증 필수.
    location / {
        auth_request /__sso_check;
        error_page 401 = @sso_login;

        proxy_pass http://127.0.0.1:18080;
        # 포트 포함된 Host 를 ZB 에 그대로 전달 — Login.html 등 자체 URL 생성 시
        # 포트 떨어지면 https://pkistdc.net 으로 빠져 빈 페이지가 됨.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ZB 가 큰 파일 업로드 받을 수 있도록.
        client_max_body_size 50M;
        proxy_read_timeout 60s;
    }
}
